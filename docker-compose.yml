services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "1q2w3e4r@#$"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "1q2w3e4r@#$$", "-Q", "SELECT 1", "-C", "-l", "5"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: GoodHamburger.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__GoodHamburgerConnection: "Server=sqlserver,1433;Database=GoodHamburger;User ID=sa;Password=1q2w3e4r@#$;Trusted_Connection=False;TrustServerCertificate=True;"
      AllowedOrigins__0: "http://localhost"
    ports:
      - "5198:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: GoodHamburger.Web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
